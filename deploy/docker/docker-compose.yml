name: grid-binance

services:
  api-server:
    build:
      context: ../..
      dockerfile: deploy/docker/api-server.Dockerfile
    environment:
      APP_ENV: production
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8080/healthz")
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/web.Dockerfile
    depends_on:
      api-server:
        condition: service_started
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch("http://127.0.0.1:3000").then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api-server:
        condition: service_started
      web:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://127.0.0.1/nginx-health >/dev/null
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      nginx:
        condition: service_started
    ports:
      - "9090:9090"
    restart: unless-stopped
    volumes:
      - prometheus-data:/prometheus
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro

volumes:
  prometheus-data:

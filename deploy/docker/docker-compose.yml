name: grid-binance

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api-server:
    build:
      context: ../..
      dockerfile: deploy/docker/api-server.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      SESSION_TOKEN_SECRET: ${SESSION_TOKEN_SECRET:?SESSION_TOKEN_SECRET is required}
      EXCHANGE_CREDENTIALS_MASTER_KEY: ${EXCHANGE_CREDENTIALS_MASTER_KEY:?EXCHANGE_CREDENTIALS_MASTER_KEY is required}
      ADMIN_EMAILS: ${ADMIN_EMAILS:?ADMIN_EMAILS is required}
      PORT: "8080"
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8080/healthz")
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  trading-engine:
    build:
      context: ../..
      dockerfile: deploy/docker/rust-service.Dockerfile
      args:
        APP_NAME: trading-engine
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      PORT: "8081"
    expose:
      - "8081"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8081/healthz")
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: ../..
      dockerfile: deploy/docker/rust-service.Dockerfile
      args:
        APP_NAME: scheduler
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      EXCHANGE_CREDENTIALS_MASTER_KEY: ${EXCHANGE_CREDENTIALS_MASTER_KEY:?EXCHANGE_CREDENTIALS_MASTER_KEY is required}
      PORT: "8082"
    expose:
      - "8082"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8082/healthz")
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  market-data-gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/rust-service.Dockerfile
      args:
        APP_NAME: market-data-gateway
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      PORT: "8083"
    expose:
      - "8083"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8083/healthz")
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  billing-chain-listener:
    build:
      context: ../..
      dockerfile: deploy/docker/rust-service.Dockerfile
      args:
        APP_NAME: billing-chain-listener
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      PORT: "8084"
    expose:
      - "8084"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8084/healthz")
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/web.Dockerfile
    depends_on:
      api-server:
        condition: service_started
    environment:
      AUTH_API_BASE_URL: http://api-server:8080
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      SESSION_TOKEN_SECRET: ${SESSION_TOKEN_SECRET:?SESSION_TOKEN_SECRET is required}
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - 'fetch("http://127.0.0.1:3000").then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))'
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api-server:
        condition: service_started
      web:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://127.0.0.1/nginx-health >/dev/null
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      api-server:
        condition: service_started
      trading-engine:
        condition: service_started
      scheduler:
        condition: service_started
      market-data-gateway:
        condition: service_started
      billing-chain-listener:
        condition: service_started
      nginx:
        condition: service_started
    ports:
      - "9090:9090"
    restart: unless-stopped
    volumes:
      - prometheus-data:/prometheus
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
